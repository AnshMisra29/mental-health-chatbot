<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MindCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p style="color: var(--text-secondary);">Start your mental health journey today</p>
        </div>

        <form action="login.html">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Full Name</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 15px; top: 15px; color: #aaa;"></i>
                    <input type="text" class="form-control" style="padding-left: 45px;" placeholder="Alex Doe" required>
                </div>
            </div>

            <div class="form-group" style="text-align: left;">
                <label class="form-label">Email Address</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-envelope" style="position: absolute; left: 15px; top: 15px; color: #aaa;"></i>
                    <input type="email" class="form-control" style="padding-left: 45px;" placeholder="name@example.com"
                        required>
                </div>
            </div>

            <div class="form-group" style="text-align: left;">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 15px; color: #aaa;"></i>
                    <input type="password" class="form-control" style="padding-left: 45px;"
                        placeholder="Create a password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

</body>

</html>
