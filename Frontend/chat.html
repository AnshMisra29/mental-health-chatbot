<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Session | MindCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-brain" style="margin-right: 10px;"></i> MindCare
            </div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="chat.html" class="nav-link active"><i class="fa-solid fa-comments"></i> Chat</a></li>
                <li><a href="#" class="nav-link"><i class="fa-solid fa-chart-line"></i> Analysis</a></li>
                <li><a href="alert_history.html" class="nav-link"><i class="fa-solid fa-bell"></i> Alerts</a></li>
            </ul>
            <a href="login.html" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content" style="padding-bottom: 0;">
            <div class="chat-window" style="height: 95vh;">
                <div class="chat-header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 10px; height: 10px; background-color: #2ecc71; border-radius: 50%;"></div>
                        <span>MindCare Bot (Online)</span>
                    </div>
                    <i class="fa-solid fa-ellipsis-vertical" style="color: var(--text-secondary); cursor: pointer;"></i>
                </div>

                <div class="chat-body" id="chatMessages">
                    <div class="message bot">
                        Hi Alex, I'm here to support you. How are you feeling right now?
                    </div>
                </div>

                <div class="chat-footer">
                    <button class="btn btn-secondary" style="border: none; padding: 10px;"><i
                            class="fa-solid fa-paperclip"></i></button>
                    <input type="text" id="userInput" class="chat-input" placeholder="Type a message...">
                    <button id="sendBtn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Reusing the chat logic from script.js -->
    <script src="script.js"></script>
</body>

</html>
