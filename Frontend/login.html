<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MindCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-brain" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 20px;"></i>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-secondary);">Sign in to continue your journey</p>
        </div>

        <form action="dashboard.html"> <!-- For demo purposes, form submits to dashboard -->
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Email Address</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-envelope" style="position: absolute; left: 15px; top: 15px; color: #aaa;"></i>
                    <input type="email" class="form-control" style="padding-left: 45px;" placeholder="name@example.com"
                        required>
                </div>
            </div>

            <div class="form-group" style="text-align: left;">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 15px; color: #aaa;"></i>
                    <input type="password" class="form-control" style="padding-left: 45px;"
                        placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
        </div>
        <div style="margin-top: 15px; font-size: 0.85rem;">
            <a href="index.html" style="color: var(--text-secondary);">Back to Home</a>
        </div>
    </div>

</body>

</html>
